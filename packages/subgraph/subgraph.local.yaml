# Copy addresses from deployments/localhost.json after running make deploy-local
specVersion: 1.0.0
description: FluxMarkets prediction market subgraph — local development (hardhat)
repository: https://github.com/fluxmarkets/fluxmarkets
schema:
  file: ./schema.graphql

indexerHints:
  prune: auto

dataSources:
  # ── MarketFactory — primary entry point for market metadata + category ──────
  - kind: ethereum
    name: MarketFactory
    network: hardhat
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: MarketFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Protocol
        - User
      abis:
        - name: MarketFactory
          file: ../contracts/out/MarketFactory.sol/MarketFactory.json
      eventHandlers:
        - event: MarketDeployed(indexed bytes32,indexed address,string,string,uint256)
          handler: handleMarketDeployed
      file: ./src/marketFactory.ts

  # ── PredictionMarket — core trading events ────────────────────────────────
  - kind: ethereum
    name: PredictionMarket
    network: hardhat
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: PredictionMarket
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - Position
        - User
        - LiquidityEvent
        - Protocol
        - CLOBMarketLink
      abis:
        - name: PredictionMarket
          file: ../contracts/out/PredictionMarket.sol/PredictionMarket.json
        - name: CLOBOrderBook
          file: ../contracts/out/CLOBOrderBook.sol/CLOBOrderBook.json
      eventHandlers:
        - event: MarketCreated(indexed bytes32,indexed address,string,string,uint256)
          handler: handleMarketCreated
        - event: LiquidityAdded(indexed bytes32,indexed address,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed bytes32,indexed address,uint256,uint256[])
          handler: handleLiquidityRemoved
        - event: OutcomeBought(indexed bytes32,indexed address,uint256,uint256,uint256)
          handler: handleOutcomeBought
        - event: OutcomeSold(indexed bytes32,indexed address,uint256,uint256,uint256)
          handler: handleOutcomeSold
        - event: MarketResolved(indexed bytes32,uint256[])
          handler: handleMarketResolved
        - event: MarketCancelled(indexed bytes32)
          handler: handleMarketCancelled
        - event: PositionsRedeemed(indexed bytes32,indexed address,uint256)
          handler: handlePositionsRedeemed
      file: ./src/predictionMarket.ts

  # ── FPMMFactory — creates FPMM templates ──────────────────────────────────
  - kind: ethereum
    name: FPMMFactory
    network: hardhat
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: FPMMFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - FPMMMarketLink
      abis:
        - name: FPMMFactory
          file: ../contracts/out/FPMMFactory.sol/FPMMFactory.json
      eventHandlers:
        - event: FPMMCreated(indexed address,indexed address,indexed address,bytes32,uint256)
          handler: handleFPMMCreated
      file: ./src/fpmmFactory.ts

  # ── UMAOracleAdapter — resolution oracle ──────────────────────────────────
  - kind: ethereum
    name: UMAOracleAdapter
    network: hardhat
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: UMAOracleAdapter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - OracleAssertion
        - Market
      abis:
        - name: UMAOracleAdapter
          file: ../contracts/out/UMAOracleAdapter.sol/UMAOracleAdapter.json
      eventHandlers:
        - event: AssertionInitiated(indexed bytes32,indexed bytes32,uint256,address)
          handler: handleAssertionInitiated
        - event: AssertionSettled(indexed bytes32,indexed bytes32,bool,uint256[])
          handler: handleAssertionSettled
        - event: AssertionDisputed(indexed bytes32,indexed bytes32,address)
          handler: handleAssertionDisputed
      file: ./src/oracle.ts

templates:
  # ── FixedProductMarketMaker — one per market ──────────────────────────────
  - kind: ethereum
    name: FixedProductMarketMaker
    network: hardhat
    source:
      abi: FixedProductMarketMaker
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - Position
        - User
        - LiquidityEvent
        - FPMMMarketLink
        - MarketHourSnapshot
        - MarketDaySnapshot
        - Protocol
      abis:
        - name: FixedProductMarketMaker
          file: ../contracts/out/FPMMFactory.sol/FixedProductMarketMaker.json
      eventHandlers:
        - event: FPMMFundingAdded(indexed address,uint256[],uint256)
          handler: handleFPMMFundingAdded
        - event: FPMMFundingRemoved(indexed address,uint256[],uint256,uint256)
          handler: handleFPMMFundingRemoved
        - event: FPMMBuy(indexed address,uint256,uint256,indexed uint256,uint256)
          handler: handleFPMMBuy
        - event: FPMMSell(indexed address,uint256,uint256,indexed uint256,uint256)
          handler: handleFPMMSell
      file: ./src/fpmm.ts

  # ── CLOBOrderBook — one per market ────────────────────────────────────────
  - kind: ethereum
    name: CLOBOrderBook
    network: hardhat
    source:
      abi: CLOBOrderBook
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Order
        - Trade
        - Position
        - User
        - CLOBMarketLink
        - MarketHourSnapshot
        - MarketDaySnapshot
        - Protocol
      abis:
        - name: CLOBOrderBook
          file: ../contracts/out/CLOBOrderBook.sol/CLOBOrderBook.json
      eventHandlers:
        - event: OrderPlaced(indexed bytes32,indexed address,uint8,uint256,uint256,uint256)
          handler: handleOrderPlaced
        - event: OrderFilled(indexed bytes32,indexed bytes32,indexed address,uint256,uint256)
          handler: handleOrderFilled
        - event: OrderPartiallyFilled(indexed bytes32,uint256,uint256)
          handler: handleOrderPartiallyFilled
        - event: OrderCancelled(indexed bytes32,indexed address,uint256)
          handler: handleOrderCancelled
        - event: TradeExecuted(indexed bytes32,indexed bytes32,uint256,uint256,uint256)
          handler: handleTradeExecuted
      file: ./src/clob.ts
