specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PredictionMarket
    network: hardhat
    source:
      address: "0x0000000000000000000000000000000000000000"  # replace after deploy
      abi: PredictionMarket
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - Position
        - Resolution
      abis:
        - name: PredictionMarket
          file: ../contracts/out/PredictionMarket.sol/PredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,indexed address,string,uint256)
          handler: handleMarketCreated
        - event: SharesBought(indexed uint256,indexed address,bool,uint256,uint256)
          handler: handleSharesBought
        - event: SharesSold(indexed uint256,indexed address,bool,uint256,uint256)
          handler: handleSharesSold
        - event: MarketResolved(indexed uint256,uint8)
          handler: handleMarketResolved
        - event: Redeemed(indexed uint256,indexed address,uint256)
          handler: handleRedeemed
      file: ./src/mappings.ts
